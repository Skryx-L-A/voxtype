<?xml version="1.0" encoding="UTF-8"?>
<!-- Quassel app mark. Direction B (Lokal): off-white tile, pine glyph.
     Glyph = text-insertion cursor (I-beam) fused with a soundwave:
     "your speech, at your cursor." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Quassel">
  <rect x="8" y="8" width="112" height="112" rx="30" fill="#F4F7F3" stroke="#0F6B4F" stroke-opacity="0.16" stroke-width="3"/>
  <g fill="#0F6B4F">
    <!-- text cursor (I-beam): stem + top/bottom caps -->
    <rect x="33" y="38" width="12" height="52" rx="6"/>
    <rect x="26" y="36" width="26" height="10" rx="5"/>
    <rect x="26" y="82" width="26" height="10" rx="5"/>
    <!-- soundwave bars -->
    <rect x="61" y="48" width="11" height="32" rx="5.5"/>
    <rect x="78" y="34" width="11" height="60" rx="5.5"/>
    <rect x="95" y="52" width="11" height="24" rx="5.5"/>
  </g>
</svg>
