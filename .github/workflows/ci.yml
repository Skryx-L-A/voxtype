name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: |
          bash -n install.sh uninstall.sh bin/quassel-ctl bin/quasseld bin/quassel bin/quassel-pill
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck >/dev/null
          shellcheck -S warning install.sh uninstall.sh bin/quassel-ctl || true
      - name: Python compile
        run: python3 -m py_compile quassel/*.py
      - name: Text processing tests
        run: |
          PYTHONPATH=. python3 - <<'PY'
          from quassel.textproc import postprocess
          class C: punctuation=True; commands=True
          k,v = postprocess("hallo komma welt punkt", C())
          assert v == "Hallo, welt.", v
          k,v = postprocess("scratch that", C())
          assert k == "command", (k, v)
          print("ok")
          PY
      - name: Chord state machine tests (shared Linux/Windows logic)
        run: python3 tests/test_machine.py
      - name: Streaming typing tests
        run: python3 tests/test_streaming.py
