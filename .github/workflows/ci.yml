name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Shell syntax
        run: |
          bash -n install.sh uninstall.sh bin/quassel-ctl bin/quasseld bin/quassel bin/quassel-pill
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck >/dev/null
          shellcheck -S warning install.sh uninstall.sh bin/quassel-ctl || true
      - name: Python compile
        run: python3 -m py_compile quassel/*.py
      - name: Text processing tests
        run: |
          PYTHONPATH=. python3 - <<'PY'
          from quassel.textproc import postprocess
          class C: punctuation=True; commands=True
          k,v = postprocess("hallo komma welt punkt", C())
          assert v == "Hallo, welt.", v
          k,v = postprocess("scratch that", C())
          assert k == "command", (k, v)
          print("ok")
          PY
      - name: Chord state machine tests (shared Linux/Windows logic)
        run: python3 tests/test_machine.py
      - name: Streaming typing tests
        run: python3 tests/test_streaming.py
      - name: Hardware model-selection tests (shared Linux/Windows logic)
        run: python3 tests/test_hwdetect.py
      - name: Media-control ducking tests
        run: python3 tests/test_mediacontrol.py
      - name: VAD / silence-detector tests
        run: python3 tests/test_vad.py
      - name: Text-replacement tests
        run: python3 tests/test_textreplace.py
      - name: Programmer-mode tests
        run: python3 tests/test_progmode.py
      - name: Usage-statistics tests
        run: python3 tests/test_stats.py
      - name: Update-check tests
        run: python3 tests/test_updatecheck.py
      - name: Audio-file transcription tests
        run: python3 tests/test_transcribe_file.py
      - name: Auto-learn dictionary tests
        run: python3 tests/test_learn.py
      - name: Text post-processing tests (commands, punctuation)
        run: python3 tests/test_textproc.py
      - name: Whisper-client argument tests (mixed language)
        run: python3 tests/test_whisperclient.py
      - name: Wake-word tests
        run: python3 tests/test_wakeword.py
      - name: Local-AI client tests (Ollama, no network)
        run: python3 tests/test_ai.py
      - name: AI modes tests (modes, voice triggers)
        run: python3 tests/test_aimodes.py
